
#paths/orcamento.yaml

paths:
    #--buscar todos os orcamentos
    /orcamento:
        get:
            tags:
                - Orcamento *
            summary: Buscar todos os orcamentos
            responses:
                "200":
                    description: Orcamentos encontrados com sucesso
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseSuccess"
                "500":
                    description: Erro ao buscar orcamentos
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseError"


    #--criar orcamento
    /orcamento/create:
        post:
            tags:
                - Orcamento *
            summary: Criar um novo orcamento
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/createorcamento"
            responses:
                "200":
                    description: Orcamento criado com sucesso
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseSuccess"
                "400":
                    description: Dados invalidos
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseError"
                "500":
                    description: Erro ao criar orcamento
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseError"


    #--buscar orcamento por id
    /orcamento/get-by-id/{id}:
        get:
            tags:
                - Orcamento *
            summary: Buscar um orcamento por id
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: string
                    example: "1"
            responses:
                "200":
                    description: Orcamento encontrado com sucesso
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseSuccess"
                "404":
                    description: Orcamento nao encontrado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseError"
                "500":
                    description: Erro ao buscar orcamento
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseError"


    #--atualizar orcamento por id
    /orcamento/update/{id}:
        put:
            tags:
                - Orcamento *
            summary: Atualizar um orcamento por id
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: string
                    example: "1"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/updateorcamento"
            responses:
                "200":
                    description: Orcamento atualizado com sucesso
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseSuccess"
                "400":
                    description: Dados invalidos
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseError"
                "500":
                    description: Erro ao atualizar orcamento
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseError"


    #--deletar orcamento por id
    /orcamento/delete/{id}:
        delete:
            tags:
                - Orcamento *
            summary: Deletar um orcamento por id
            parameters:
                - name: id
                  in: path
                  required: true
                  schema:
                    type: string
                    example: "1"
            responses:
                "200":
                    description: Orcamento deletado com sucesso
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseSuccess"
                "404":
                    description: Orcamento nao encontrado
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseError"
                "500":
                    description: Erro ao deletar orcamento
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResponseError"