#--schemas/response.yaml--#

components:
  schemas:
    # Schema global de resposta de sucesso
    ResponseSuccess:
      type: object
      properties:
        message:
          type: string
          example: Operação realizada com sucesso
        status:
          type: boolean
          example: true
        data:
          type: object
          nullable: true

    # Schema global de resposta de erro
    ResponseError:
      type: object
      properties:
        message:
          type: string
          example: Ocorreu um erro na requisição
        status:
          type: boolean
          example: false
        data:
          type: object
          nullable: true
